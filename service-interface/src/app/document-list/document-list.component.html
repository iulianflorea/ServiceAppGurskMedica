<div class="container-doc-list list-page-container">
  <div class="list-erp-header">
    <span class="list-erp-title">Lista Documente</span>
    <button mat-mini-fab color="accent" routerLink="/documents-form"
            aria-label="Add new document">
      <mat-icon>plus_one</mat-icon>
    </button>
  </div>

  <div class="list-page-header">
    <form (submit)="search()" class="search-bar" style="display: flex; gap: 10px; flex-wrap: wrap;">
      <mat-form-field appearance="outline">
        <mat-label>Search</mat-label>
        <input matInput [(ngModel)]="keyword" [ngModelOptions]="{standalone: true}" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Caută după dată</mat-label>
        <input matInput [matDatepicker]="datePicker" [(ngModel)]="selectedDate" [ngModelOptions]="{standalone: true}" (dateChange)="onDateChange($event)">
        <mat-datepicker-toggle matSuffix [for]="datePicker"></mat-datepicker-toggle>
        <mat-datepicker #datePicker [touchUi]="isMobile"></mat-datepicker>
      </mat-form-field>

      <button mat-button type="submit">Search</button>
    </form>
  </div>

  <div class="list-scroll-body">
    <mat-progress-spinner
      *ngIf="loading"
      mode="indeterminate"
      color="primary"
      class="spinner">
    </mat-progress-spinner>

    <div *ngIf="!loading && documents2.data.length === 0" class="empty-state">
      Nu există documente salvate.
    </div>

    <div class="mat-elevation-z8" style="overflow-x: auto;">
      <table mat-table [dataSource]="documents2" class="full-width-table">

        <!-- ID -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let doc">{{ doc.id }}</td>
        </ng-container>

        <!-- Client -->
        <ng-container matColumnDef="customerName">
          <th mat-header-cell *matHeaderCellDef>Client</th>
          <td mat-cell *matCellDef="let doc">{{ doc.customerName }}</td>
        </ng-container>

        <!-- Echipament -->
        <ng-container matColumnDef="contractDate">
          <th mat-header-cell *matHeaderCellDef>Data Contractului</th>
          <td mat-cell *matCellDef="let doc">{{ doc.contractDate }}</td>
        </ng-container>

        <!-- Contract -->
        <ng-container matColumnDef="numberOfContract">
          <th mat-header-cell *matHeaderCellDef>Contract</th>
          <td mat-cell *matCellDef="let doc">{{ doc.numberOfContract }}</td>
        </ng-container>

        <!-- Acțiuni -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Acțiuni</th>
          <td mat-cell *matCellDef="let doc" (click)="$event.stopPropagation()">
            <button mat-icon-button color="warn" matTooltip="Șterge" (click)="delete(doc)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"
            (click)="navigateToForm(row.id)" style="cursor: pointer;"></tr>
      </table>
    </div>
  </div>
</div>
