<div class="form-page-container">

  <!-- ERP Header -->
  <div class="erp-header">
    <div class="erp-header-left">
      <button mat-icon-button class="back-btn" type="button" (click)="goBack()">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <div class="erp-title">
        <span class="erp-breadcrumb">Produse</span>
        <span class="erp-name">Actualizare Stoc</span>
      </div>
    </div>
  </div>

  <!-- Scrollable body -->
  <div class="form-body-scroll">
    <form [formGroup]="scanForm" (ngSubmit)="onSubmit()" class="erp-form-body">

      <div class="erp-section">
        <div class="erp-section-title">Date Produs</div>
        <div class="erp-fields-grid">

          <mat-form-field appearance="outline" class="field-half">
            <mat-label>Cantitate</mat-label>
            <input matInput formControlName="quantity" type="number" #quantityInput/>
            <mat-icon matSuffix>inventory_2</mat-icon>
          </mat-form-field>

          <!-- Cod manual — vizibil doar când NU e mod scanare -->
          <mat-form-field appearance="outline" class="field-half" *ngIf="!scanMode">
            <mat-label>Cod produs</mat-label>
            <input matInput formControlName="productCode" #codeInput/>
            <mat-icon matSuffix>qr_code</mat-icon>
          </mat-form-field>

        </div>

        <!-- Butoane mod scanare -->
        <div style="display: flex; gap: 10px; margin-top: 0.75rem; flex-wrap: wrap; align-items: center;">
          <button mat-raised-button color="primary" type="submit" *ngIf="!scanMode">
            <mat-icon>send</mat-icon> Trimite
          </button>

          <button mat-stroked-button color="primary" type="button"
                  *ngIf="!scanMode" (click)="enableScanMode()">
            <mat-icon>qr_code_scanner</mat-icon> Scanează cu camera
          </button>

          <button mat-stroked-button color="warn" type="button"
                  *ngIf="scanMode" (click)="disableScanMode()">
            <mat-icon>keyboard</mat-icon> Introdu manual
          </button>
        </div>

        <!-- Scanner cameră -->
        <div *ngIf="scanMode" class="scanner-container">
          <p class="scanner-hint">
            <mat-icon style="vertical-align: middle; font-size: 18px;">info</mat-icon>
            Asigură-te că cantitatea e completată, apoi îndreaptă camera spre cod.
          </p>
          <zxing-scanner
            [enable]="scannerEnabled"
            [formats]="formatsToScan"
            (scanSuccess)="onCodeScanned($event)">
          </zxing-scanner>
          <p *ngIf="!scannerEnabled" style="text-align:center; color:#999; margin-top: 8px;">
            <mat-icon style="vertical-align:middle;">hourglass_top</mat-icon>
            Procesare...
          </p>
        </div>

        <!-- Mesaj răspuns -->
        <p *ngIf="responseMessage" class="response-msg"
           [style.color]="responseSuccess ? '#388e3c' : '#d32f2f'">
          {{ responseMessage }}
        </p>

      </div>

    </form>
  </div>

</div>
