<div class="form-page-container">

  <!-- ERP Header -->
  <div class="erp-header">
    <div class="erp-header-left">
      <div class="erp-title">
        <span class="erp-breadcrumb">Produse</span>
        <span class="erp-name">Actualizare Stoc</span>
      </div>
    </div>
  </div>

  <!-- Scrollable body -->
  <div class="form-body-scroll">
    <form [formGroup]="scanForm" (ngSubmit)="onSubmit()" class="erp-form-body">

      <div class="erp-section">
        <div class="erp-section-title">Date Produs</div>
        <div class="erp-fields-grid">

          <mat-form-field appearance="outline" class="field-half">
            <mat-label>Quantity</mat-label>
            <input matInput formControlName="quantity" #quantityInput/>
            <mat-icon matSuffix>inventory_2</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="field-half">
            <mat-label>Code</mat-label>
            <input matInput formControlName="productCode"/>
            <mat-icon matSuffix>qr_code</mat-icon>
          </mat-form-field>

        </div>

        <div style="margin-top: 0.5rem;">
          <button mat-raised-button color="primary" type="submit">
            <mat-icon>send</mat-icon> Trimite
          </button>
        </div>

        <p *ngIf="responseMessage" style="margin-top: 1rem; color: #3f51b5; font-weight: 500;">
          {{ responseMessage }}
        </p>
      </div>

    </form>
  </div>

</div>
