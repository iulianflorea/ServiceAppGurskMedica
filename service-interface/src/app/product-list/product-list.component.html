<div class="product-container list-page-container">
  <div class="list-erp-header">
    <span class="list-erp-title">Products</span>
    <div style="display:flex; gap:8px; align-items:center;">
      <button mat-icon-button (click)="ngOnInit()" matTooltip="Reîncarcă lista" aria-label="Refresh">
        <mat-icon>refresh</mat-icon>
      </button>
      <button mat-mini-fab color="accent" routerLink="/product-form"
              aria-label="Add new product">
        <mat-icon>plus_one</mat-icon>
      </button>
    </div>
  </div>

  <div class="list-page-header">
    <form (submit)="search()" class="search-bar" style="display: flex; gap: 10px; flex-wrap: wrap;">
      <mat-form-field appearance="outline">
        <mat-label>Search</mat-label>
        <input matInput [(ngModel)]="keyword" [ngModelOptions]="{standalone: true}" />
      </mat-form-field>
      <button mat-flat-button color="primary" type="submit">Search</button>
    </form>
  </div>

  <!-- Table -->
  <div class="list-scroll-body">
    <div class="mat-elevation-z8">
      <table mat-table [dataSource]="dataSource2">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> No.</th>
          <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let element"> {{element.name}} </td>
        </ng-container>

        <ng-container matColumnDef="cod">
          <th mat-header-cell *matHeaderCellDef>Code</th>
          <td mat-cell *matCellDef="let element"> {{element.cod}} </td>
        </ng-container>

        <ng-container matColumnDef="producer">
          <th mat-header-cell *matHeaderCellDef>Producer</th>
          <td mat-cell *matCellDef="let element"> {{element.producerName}} </td>
        </ng-container>

        <ng-container matColumnDef="priceWithVAT">
          <th mat-header-cell *matHeaderCellDef>Price with TVA</th>
          <td mat-cell *matCellDef="let element"> {{ element.priceWithVAT | number:'1.2-2' }} Euro </td>
        </ng-container>

        <ng-container matColumnDef="quantity">
          <th mat-header-cell *matHeaderCellDef>Quantity</th>
          <td mat-cell *matCellDef="let element"> {{element.quantity}} </td>
        </ng-container>

        <ng-container matColumnDef="delete">
          <th mat-header-cell *matHeaderCellDef>Delete</th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button color="warn" (click)="delete(element); $event.stopPropagation()">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="image">
          <th mat-header-cell *matHeaderCellDef>Image</th>
          <td mat-cell *matCellDef="let element">
            <img
              [src]="getImage(element.imageName)"
              alt="product image"
              width="150"
              height="150"
            />
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="navigateToEdit(row)" class="clickable-row"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[20, 30, 50]"
                     showFirstLastButtons
                     aria-label="Select page of periodic elements">
      </mat-paginator>
    </div>
  </div>
</div>
