<div class="form-page-container">

  <!-- ERP Header -->
  <div class="erp-header">
    <div class="erp-header-left">
      <button mat-icon-button routerLink="/customer-list" class="back-btn" type="button">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <div class="erp-title">
        <span class="erp-breadcrumb">Clienți</span>
        <span class="erp-name">{{ id ? (name || 'Client') : 'Client Nou' }}</span>
        <span *ngIf="id" class="erp-id-badge">#{{ id }}</span>
      </div>
    </div>
    <div class="erp-header-actions">
      <button mat-raised-button color="primary" type="button" (click)="saveCustomer()">
        <mat-icon>save</mat-icon> Salvează
      </button>
      <button mat-stroked-button color="warn" routerLink="/customer-list" type="button">
        <mat-icon>cancel</mat-icon> Anulează
      </button>
    </div>
  </div>

  <!-- Scrollable body -->
  <div class="form-body-scroll">
    <form [formGroup]="customerForm" (ngSubmit)="saveCustomer()" class="erp-form-body">

      <div class="erp-section">
        <div class="erp-section-title">Informații Client</div>
        <div class="erp-fields-grid">

          <mat-form-field appearance="outline" class="field-full">
            <mat-label>Name</mat-label>
            <input matInput [(ngModel)]="name" [ngModelOptions]="{standalone: true}"/>
            <mat-icon matSuffix>person</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="field-half">
            <mat-label>CUI</mat-label>
            <input matInput [(ngModel)]="cui" [ngModelOptions]="{standalone: true}"/>
          </mat-form-field>

          <mat-form-field appearance="outline" class="field-half">
            <mat-label>Telephone</mat-label>
            <input matInput [(ngModel)]="telephone" [ngModelOptions]="{standalone: true}"/>
            <mat-icon matSuffix>phone</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="field-full">
            <mat-label>Address</mat-label>
            <input matInput [(ngModel)]="address" [ngModelOptions]="{standalone: true}"/>
            <mat-icon matSuffix>location_on</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="field-full">
            <mat-label>E-mail Address</mat-label>
            <input matInput [(ngModel)]="email" [ngModelOptions]="{standalone: true}"/>
            <mat-icon matSuffix>email</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="field-full">
            <mat-label>Persoană de Contact</mat-label>
            <input matInput [(ngModel)]="contactPerson" [ngModelOptions]="{standalone: true}"/>
            <mat-icon matSuffix>contact_phone</mat-icon>
          </mat-form-field>

        </div>
      </div>

    </form>
  </div>

</div>
