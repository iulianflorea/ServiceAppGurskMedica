
<div class="customer-container list-page-container">
  <div class="list-erp-header">
    <span class="list-erp-title">Customers</span>
    <button mat-mini-fab color="accent" routerLink="/customer-form"
            aria-label="Add new customer">
      <mat-icon>plus_one</mat-icon>
    </button>
  </div>

  <div class="list-page-header">
    <form (submit)="search()" class="search-bar">
      <mat-form-field>
        <mat-label>Search</mat-label>
        <input matInput [(ngModel)]="keyword" [ngModelOptions]="{standalone: true}" />
      </mat-form-field>
    </form>
  </div>

  <!-- Table -->
  <div class="list-scroll-body">
    <div class="mat-elevation-z8">
      <table mat-table [dataSource]="dataSource2">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> No.</th>
          <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let element"> {{element.name}} </td>
        </ng-container>

        <ng-container matColumnDef="cui">
          <th mat-header-cell *matHeaderCellDef>CUI</th>
          <td mat-cell *matCellDef="let element"> {{element.cui}} </td>
        </ng-container>

        <ng-container matColumnDef="address">
          <th mat-header-cell *matHeaderCellDef>Address</th>
          <td mat-cell *matCellDef="let element"> {{element.address}} </td>
        </ng-container>

        <ng-container matColumnDef="telephone">
          <th mat-header-cell *matHeaderCellDef>Telephone</th>
          <td mat-cell *matCellDef="let element"> {{element.telephone}} </td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>E-mail</th>
          <td mat-cell *matCellDef="let element"> {{element.email}} </td>
        </ng-container>

        <ng-container matColumnDef="delete">
          <th mat-header-cell *matHeaderCellDef>Delete</th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button color="warn" aria-label="Delete" (click)="delete(element)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="update">
          <th mat-header-cell *matHeaderCellDef>Update</th>
          <td mat-cell *matCellDef="let element">
            <a routerLink="/customer-form/{{element.id}}">
              <button mat-raised-button color="primary">Edit
              <mat-icon>edit</mat-icon>
              </button>
            </a>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[20, 30, 50]"
                     showFirstLastButtons
                     aria-label="Select page of periodic elements">
      </mat-paginator>
    </div>
  </div>
</div>
