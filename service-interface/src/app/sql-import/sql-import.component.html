<div class="form-page-container">

  <!-- ERP Header -->
  <div class="erp-header">
    <div class="erp-header-left">
      <div class="erp-title">
        <span class="erp-breadcrumb">Sistem</span>
        <span class="erp-name">Backup &amp; Import</span>
      </div>
    </div>
  </div>

  <!-- Scrollable body -->
  <div class="form-body-scroll">
    <div class="erp-form-body">

      <!-- Section 1: Configurare căi + Backup -->
      <div class="erp-section">
        <div class="erp-section-title">Configurare Căi</div>
        <form [formGroup]="pathsForm" (ngSubmit)="savePaths()">
          <div class="erp-fields-grid">

            <mat-form-field appearance="outline" class="field-full">
              <mat-label>SQL Path</mat-label>
              <input matInput formControlName="sqlPath"/>
              <mat-icon matSuffix>folder</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline" class="field-full">
              <mat-label>Doc Path</mat-label>
              <input matInput formControlName="documentPath"/>
              <mat-icon matSuffix>folder_open</mat-icon>
            </mat-form-field>

          </div>
          <div class="section-actions">
            <button mat-raised-button color="primary" type="submit">
              <mat-icon>save</mat-icon> Salvează căile
            </button>
            <button mat-raised-button color="accent" type="button" (click)="backupManualDbDoc()">
              <mat-icon>restore</mat-icon> Backup DB
            </button>
          </div>
        </form>
      </div>

      <!-- Section 2: Import baza de date -->
      <div class="erp-section">
        <div class="erp-section-title">Import Baza de Date</div>
        <form *ngIf="userIsAdmin" (submit)="onSubmit()" class="import-form">
          <input type="file" (change)="onFileSelected($event)" accept=".sql" required/>
          <button mat-raised-button color="primary" type="submit">
            <mat-icon>upload</mat-icon> Import
          </button>
        </form>
        <p *ngIf="!userIsAdmin" class="admin-warning">
          <mat-icon>warning</mat-icon>
          Doar administratorii pot face import SQL.
        </p>
      </div>

    </div>
  </div>

</div>
