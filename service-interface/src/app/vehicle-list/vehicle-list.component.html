<div class="vehicle-container list-page-container">

  <div class="list-erp-header">
    <span class="list-erp-title">Flotă Auto</span>
    <div style="display:flex; gap: 8px; align-items: center;">
      <button mat-stroked-button (click)="triggerAlerts()" [disabled]="alertTriggering"
              matTooltip="Testează trimiterea emailurilor de alertă" style="font-size: 0.8rem;">
        <mat-icon>notifications_active</mat-icon>
        {{ alertTriggering ? 'Se trimite...' : 'Test alerte email' }}
      </button>
      <button mat-icon-button (click)="loadAll()" matTooltip="Reîncarcă lista" aria-label="Refresh">
        <mat-icon>refresh</mat-icon>
      </button>
      <button mat-mini-fab color="accent" routerLink="/vehicle-form" aria-label="Adaugă mașină">
        <mat-icon>add</mat-icon>
      </button>
    </div>
  </div>

  <div class="list-page-header">
    <form (submit)="search()" class="search-bar" style="display: flex; gap: 10px; flex-wrap: wrap;">
      <mat-form-field appearance="outline">
        <mat-label>Caută mașină...</mat-label>
        <input matInput [(ngModel)]="keyword" [ngModelOptions]="{standalone: true}"/>
      </mat-form-field>
      <button mat-flat-button color="primary" type="submit">Caută</button>
    </form>
  </div>

  <div class="list-scroll-body">
    <div class="mat-elevation-z8" style="overflow-x: auto;">
      <table mat-table [dataSource]="dataSource" class="full-width-table">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let v">{{ v.id }}</td>
        </ng-container>

        <ng-container matColumnDef="photo">
          <th mat-header-cell *matHeaderCellDef>Foto</th>
          <td mat-cell *matCellDef="let v">
            <img *ngIf="getPhotoUrl(v)" [src]="getPhotoUrl(v)" class="vehicle-thumb" alt="foto" />
            <mat-icon *ngIf="!getPhotoUrl(v)" class="no-photo-icon">directions_car</mat-icon>
          </td>
        </ng-container>

        <ng-container matColumnDef="licensePlate">
          <th mat-header-cell *matHeaderCellDef>Număr</th>
          <td mat-cell *matCellDef="let v"><strong>{{ v.licensePlate }}</strong></td>
        </ng-container>

        <ng-container matColumnDef="makeModel">
          <th mat-header-cell *matHeaderCellDef>Marcă / Model</th>
          <td mat-cell *matCellDef="let v">{{ v.make }} {{ v.model }}</td>
        </ng-container>

        <ng-container matColumnDef="vin">
          <th mat-header-cell *matHeaderCellDef>VIN</th>
          <td mat-cell *matCellDef="let v" class="vin-cell">{{ v.vin }}</td>
        </ng-container>

        <ng-container matColumnDef="userName">
          <th mat-header-cell *matHeaderCellDef>Utilizator</th>
          <td mat-cell *matCellDef="let v">{{ v.userName }}</td>
        </ng-container>

        <ng-container matColumnDef="itpExpiry">
          <th mat-header-cell *matHeaderCellDef>ITP Expiră</th>
          <td mat-cell *matCellDef="let v"
              [class.expiring-soon]="isExpiringSoon(getLatestItpExpiry(v))">
            {{ getLatestItpExpiry(v) || '—' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="insuranceExpiry">
          <th mat-header-cell *matHeaderCellDef>Asigurare Expiră</th>
          <td mat-cell *matCellDef="let v"
              [class.expiring-soon]="isExpiringSoon(getLatestInsuranceExpiry(v))">
            {{ getLatestInsuranceExpiry(v) || '—' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="delete">
          <th mat-header-cell *matHeaderCellDef>Delete</th>
          <td mat-cell *matCellDef="let v">
            <button mat-icon-button color="warn" (click)="delete(v, $event); $event.stopPropagation()">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let v; columns: displayedColumns;" (click)="navigateToEdit(v)" class="clickable-row"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[20, 30, 50]" showFirstLastButtons
                     aria-label="Select page">
      </mat-paginator>
    </div>
  </div>

</div>
