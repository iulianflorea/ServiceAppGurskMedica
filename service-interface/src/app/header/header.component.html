
<div class="container-header" *ngIf="!isMobile">
  <div class="header">
    <div class="title-logo">
      <img src="assets/logo.png" alt="Logo" width="200" />
    </div>

    <div class="buttons">
      <div class="example-button-container" *ngIf="isLoggedIn()">
        <button mat-fab
                (click)="toggleAttendance()"
                [disabled]="isLoading"
                [matTooltip]="isCheckedIn ? 'Check-out (Intrare: ' + getCheckInTimeFormatted() + ')' : 'Check-in'"
                [ngClass]="isCheckedIn ? 'attendance-btn checked-in' : 'attendance-btn checked-out'">
          <mat-icon>{{ isCheckedIn ? 'logout' : 'login' }}</mat-icon>
        </button>
      </div>

      <div class="example-button-container">
        <button mat-fab color="primary" routerLink="/dashboard">
          <mat-icon>person</mat-icon>
        </button>
      </div>

      <button routerLink="/import-database" mat-button>Restaurare DB</button>
      <button routerLink="/login" mat-button *ngIf="!isLoggedIn()">Login</button>
      <button routerLink="/scan" mat-button>Act.Stoc</button>
      <button routerLink="/documents" mat-button>Documente</button>
      <button routerLink="/order" mat-button>Facturare</button>
      <button routerLink="/customer-list" mat-button>Clienti</button>
      <button routerLink="/product-list" mat-button>Produse</button>
      <button routerLink="/equipment-list" mat-button>Echipamente</button>
      <button routerLink="/intervention-sheet-list" mat-button>Interventii</button>
      <button routerLink="/vehicle-list" mat-button>Flotă</button>
      <button routerLink="/attendance-list" mat-button>Pontaj</button>
      <button routerLink="/ticket-list" mat-button>Tichete</button>
      <button routerLink="/cbct-list" mat-button>CBCT</button>
      <button mat-button (click)="logout()" routerLink="/login" *ngIf="isLoggedIn()">Logout</button>
      <mat-slide-toggle
        [checked]="isDarkMode"
        (change)="toggleDarkMode($event)">
        🌙
      </mat-slide-toggle>
    </div>
  </div>
</div>

<!-- MOBILE -->
<div class="container-header" *ngIf="isMobile">
  <div class="mobile-header">

    <button class="hamburger-btn" [matMenuTriggerFor]="menu">
      <mat-icon>menu</mat-icon>
    </button>

    <div class="mobile-title">
      <img src="assets/logo.png" alt="Logo" width="130" />
    </div>

    <div class="mobile-right">
      <mat-slide-toggle
        [checked]="isDarkMode"
        (change)="toggleDarkMode($event)"
        class="mobile-dark-toggle">
      </mat-slide-toggle>

      <button mat-mini-fab
              *ngIf="isLoggedIn()"
              (click)="toggleAttendance()"
              [disabled]="isLoading"
              [ngClass]="isCheckedIn ? 'attendance-btn-mobile checked-in' : 'attendance-btn-mobile checked-out'">
        <mat-icon>{{ isCheckedIn ? 'logout' : 'login' }}</mat-icon>
      </button>
    </div>

    <mat-menu #menu="matMenu" class="mobile-nav-menu">
      <button mat-menu-item routerLink="/dashboard">
        <mat-icon>person</mat-icon><span>Interventiile tale</span>
      </button>
      <button mat-menu-item routerLink="/documents">
        <mat-icon>description</mat-icon><span>Documente</span>
      </button>
      <button mat-menu-item routerLink="/intervention-sheet-list">
        <mat-icon>assignment</mat-icon><span>Interventii</span>
      </button>
      <button mat-menu-item routerLink="/vehicle-list">
        <mat-icon>directions_car</mat-icon><span>Flotă</span>
      </button>
      <button mat-menu-item routerLink="/order">
        <mat-icon>shopping_cart</mat-icon><span>Facturare</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item routerLink="/customer-list">
        <mat-icon>people</mat-icon><span>Clienti</span>
      </button>
      <button mat-menu-item routerLink="/product-list">
        <mat-icon>inventory_2</mat-icon><span>Produse</span>
      </button>
      <button mat-menu-item routerLink="/equipment-list">
        <mat-icon>build</mat-icon><span>Echipamente</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item routerLink="/attendance-list">
        <mat-icon>access_time</mat-icon><span>Pontaj</span>
      </button>
      <button mat-menu-item routerLink="/ticket-list">
        <mat-icon>confirmation_number</mat-icon><span>Tichete</span>
      </button>
      <button mat-menu-item routerLink="/cbct-list">
        <mat-icon>biotech</mat-icon><span>CBCT</span>
      </button>
      <button mat-menu-item routerLink="/scan">
        <mat-icon>qr_code_scanner</mat-icon><span>Act.Stoc</span>
      </button>
      <button mat-menu-item routerLink="/import-database">
        <mat-icon>restore</mat-icon><span>Restaurare DB</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item routerLink="/login" *ngIf="!isLoggedIn()">
        <mat-icon>login</mat-icon><span>Login</span>
      </button>
      <button mat-menu-item (click)="logout()" routerLink="/login" *ngIf="isLoggedIn()">
        <mat-icon>logout</mat-icon><span>Logout</span>
      </button>
    </mat-menu>
  </div>
</div>
