<div class="container-doc-list list-page-container">

  <div class="list-erp-header">
    <span class="list-erp-title">Catalog aparate CBCT</span>
    <div style="display:flex; gap:8px;">
      <button mat-raised-button routerLink="/cbct-list">
        <mat-icon>list</mat-icon> Măsurători
      </button>
      <button mat-raised-button color="primary" routerLink="/cbct-device-form">
        <mat-icon>add</mat-icon> Aparat nou
      </button>
      <button mat-icon-button matTooltip="Refresh" (click)="load()">
        <mat-icon>refresh</mat-icon>
      </button>
    </div>
  </div>

  <div class="list-scroll-body" style="padding-top:12px;">
    <table mat-table [dataSource]="devices" class="mat-elevation-z0" style="width:100%;">

      <ng-container matColumnDef="brand">
        <th mat-header-cell *matHeaderCellDef>Brand</th>
        <td mat-cell *matCellDef="let d">{{ d.brand }}</td>
      </ng-container>

      <ng-container matColumnDef="model">
        <th mat-header-cell *matHeaderCellDef>Model</th>
        <td mat-cell *matCellDef="let d">{{ d.model }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acțiuni</th>
        <td mat-cell *matCellDef="let d">
          <button mat-icon-button color="primary" matTooltip="Editează" (click)="edit(d.id!)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" matTooltip="Șterge" (click)="delete(d)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="edit(row.id!)" style="cursor:pointer;"></tr>
    </table>
  </div>

</div>
