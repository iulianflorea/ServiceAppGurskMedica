<div class="form-page-container">

  <!-- ERP Header -->
  <div class="erp-header">
    <div class="erp-header-left">
      <button mat-icon-button routerLink="/equipment-list" class="back-btn" type="button">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <div class="erp-title">
        <span class="erp-breadcrumb">Echipamente</span>
        <span class="erp-name">{{ id ? (model || 'Echipament') : 'Echipament Nou' }}</span>
        <span *ngIf="id" class="erp-id-badge">#{{ id }}</span>
      </div>
    </div>
    <div class="erp-header-actions">
      <button mat-raised-button color="primary" type="button" (click)="saveEquipment()">
        <mat-icon>save</mat-icon> Salvează
      </button>
      <button mat-stroked-button color="warn" routerLink="/equipment-list" type="button">
        <mat-icon>cancel</mat-icon> Anulează
      </button>
    </div>
  </div>

  <!-- Scrollable body -->
  <div class="form-body-scroll">
    <form [formGroup]="equipmentForm" (ngSubmit)="saveEquipment()" class="erp-form-body">

      <div class="erp-section">
        <div class="erp-section-title">Informații Echipament</div>
        <div class="erp-fields-grid">

          <mat-form-field appearance="outline" class="field-full">
            <mat-label>Model</mat-label>
            <input matInput [(ngModel)]="model" [ngModelOptions]="{standalone: true}"/>
            <mat-icon matSuffix>precision_manufacturing</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="field-half">
            <mat-label>Product Code</mat-label>
            <input matInput [(ngModel)]="productCode" [ngModelOptions]="{standalone: true}"/>
            <mat-icon matSuffix>qr_code</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="field-half">
            <mat-label>Producer</mat-label>
            <mat-select [(ngModel)]="producerSelected" [ngModelOptions]="{standalone: true}">
              <mat-option *ngFor="let producer of producerList" [value]="producer.id">
                {{producer.name}}
              </mat-option>
            </mat-select>
          </mat-form-field>

        </div>
      </div>

    </form>
  </div>

</div>
