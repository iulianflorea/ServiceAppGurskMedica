<div class="form-wrapper">
  <div class="container">
    <div class="title-form">
      <h1 *ngIf="id">Update intervention</h1>
      <h1 *ngIf="!id">Create intervention</h1>
    </div>

    <form [formGroup]="interventionSheetForm" (ngSubmit)="saveInterventionSheet()" class="form-layout">

      <!-- Stânga -->
      <div class="form-left">

        <mat-form-field appearance="fill" class="w-full">
          <mat-label>Client</mat-label>
          <input type="text" matInput [matAutocomplete]="customerAuto" [formControl]="customerControl">
          <mat-autocomplete #customerAuto="matAutocomplete">
            <mat-option *ngFor="let customer of filteredCustomers | async" [value]="customer.name">
              {{ customer.name }}
            </mat-option>
          </mat-autocomplete>
        </mat-form-field>

        <!-- EMPLOYEE -->
        <mat-form-field appearance="fill" class="w-full">
          <mat-label>Angajat</mat-label>
          <mat-select [formControl]="employeeControl">
            <mat-option *ngFor="let employee of employeeList" [value]="employee.id">
              {{ employee.firstname }} {{ employee.lastname }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <!-- EQUIPMENT -->
        <mat-form-field appearance="fill" class="w-full">
          <mat-label>Echipament</mat-label>
          <input type="text" matInput [matAutocomplete]="equipmentAuto" [formControl]="equipmentControl">
          <mat-autocomplete #equipmentAuto="matAutocomplete">
            <mat-option *ngFor="let equipment of filteredEquipment | async" [value]="equipment.model">
              {{ equipment.model }}
            </mat-option>
          </mat-autocomplete>
        </mat-form-field>

        <!-- TYPE OF INTERVENTION -->
        <mat-form-field appearance="fill" class="w-full">
          <mat-label>Tip intervenție</mat-label>
          <mat-select [formControl]="typeControl">
            <mat-option *ngFor="let type of typeOfInterventionList" [value]="type">
              {{ type }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field>
          <mat-label>Months of Warranty</mat-label>
          <input matInput [(ngModel)]="yearsOfWarranty" [ngModelOptions]="{standalone: true}"/>
        </mat-form-field>

        <mat-form-field>
          <mat-label>Serial Number</mat-label>
          <input matInput [(ngModel)]="serialNumber" [ngModelOptions]="{standalone: true}"/>
        </mat-form-field>
      </div>

      <!-- Dreapta -->
      <div class="form-right">
        <mat-form-field>
          <mat-label>Noticed</mat-label>
          <input matInput [(ngModel)]="noticed" [ngModelOptions]="{standalone: true}"/>
        </mat-form-field>

        <mat-form-field>
          <mat-label>Fixed</mat-label>
          <input matInput [(ngModel)]="fixed" [ngModelOptions]="{standalone: true}"/>
        </mat-form-field>

        <mat-form-field>
          <mat-label>Engineer Note</mat-label>
          <input matInput [(ngModel)]="engineerNote" [ngModelOptions]="{standalone: true}"/>
        </mat-form-field>

        <!-- Semnătura -->
        <div class="signature-container">
          <app-signature-pad></app-signature-pad>
        </div>
      </div>

      <mat-form-field appearance="fill" class="w-full">
        <mat-label>Data intervenției</mat-label>
        <input matInput [matDatepicker]="interventionDatePicker" [(ngModel)]="selectedDateOfIntervention" [ngModelOptions]="{standalone: true}" (dateChange)="onDateChange($event)">
        <mat-datepicker-toggle matSuffix [for]="interventionDatePicker"></mat-datepicker-toggle>
        <mat-datepicker #interventionDatePicker [touchUi]="isMobile"></mat-datepicker>
      </mat-form-field>
      <div class="form-button">
        <button mat-raised-button color="primary" type="submit">Save
          <mat-icon>save</mat-icon>
        </button>
        <button mat-raised-button color="warn" type="submit" routerLink="/intervention-sheet-list">Cancel
          <mat-icon>cancel</mat-icon>
        </button>
      </div>
    </form>
  </div>
</div>
