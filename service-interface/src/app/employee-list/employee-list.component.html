
<div class="employee-container list-page-container">
  <div class="list-erp-header">
    <span class="list-erp-title">Employees</span>
    <div style="display:flex; gap:8px; align-items:center;">
      <button mat-icon-button (click)="ngOnInit()" matTooltip="Reîncarcă lista" aria-label="Refresh">
        <mat-icon>refresh</mat-icon>
      </button>
      <button mat-mini-fab color="accent" routerLink="/employee-form"
              aria-label="Add new employee">
        <mat-icon>plus_one</mat-icon>
      </button>
    </div>
  </div>

  <div class="list-page-header">
  </div>

  <!-- Table -->
  <div class="list-scroll-body">
    <div class="mat-elevation-z8">
      <table mat-table [dataSource]="dataSource2">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> No.</th>
          <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let element"> {{element.name}} </td>
        </ng-container>

        <ng-container matColumnDef="cnp">
          <th mat-header-cell *matHeaderCellDef>CNP</th>
          <td mat-cell *matCellDef="let element"> {{element.cnp}} </td>
        </ng-container>

        <ng-container matColumnDef="delete">
          <th mat-header-cell *matHeaderCellDef>Delete</th>
          <td mat-cell *matCellDef="let element">
            <button mat-fab color="transparent" aria-label="Delete" (click)="delete(element)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="update">
          <th mat-header-cell *matHeaderCellDef>Update</th>
          <td mat-cell *matCellDef="let element">
            <a routerLink="/employee-form/{{element.id}}">
              <button mat-raised-button>Edit</button>
            </a>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[20, 30, 50]"
                     showFirstLastButtons
                     aria-label="Select page of periodic elements">
      </mat-paginator>
    </div>
  </div>
</div>
